name: Release

# Cut a release by pushing a semver tag:
#
#     git tag v0.1.0 && git push origin v0.1.0
#
# Each matrix job builds and packages one platform, then a final job attaches
# every artifact to a DRAFT GitHub Release for review before publishing.
# A pre-release dry run is available via "Run workflow" (workflow_dispatch).
#
# Builds are currently UNSIGNED. macOS users must bypass Gatekeeper and Windows
# users SmartScreen on first launch (see README "Download & install"). Signing
# and notarization can be layered on later without restructuring this file.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, e.g. 0.1.0-rc.1 (a draft release/tag is created)"
        required: true

# The shared OpenObserve client lives in a separate public repo and is wired in
# via go.work / a go.mod replace pointing at ../oa-cli/src/openobserve-cli.
# CI reproduces that side-by-side layout by cloning it directly (see below).
env:
  OACLI_REPO: AngelMsger/openobserve-cli
  # Pin the shared client to an immutable tag so a given o3 release is
  # reproducible — 'main' would let a later rebuild compile different dependency
  # code. Bump this in lockstep when a release needs a newer openobserve-cli.
  OACLI_REF: v0.6.0
  WAILS_VERSION: v2.12.0
  GO_VERSION: "1.24"
  NODE_VERSION: "20"
  # Guards against out-of-memory failures during the frontend build.
  NODE_OPTIONS: "--max-old-space-size=4096"

concurrency:
  # Key by the requested version, not the ref, so two manual dispatches for the
  # same version (even from different branches) serialize instead of racing to
  # create the same tag. Tag pushes fall back to the tag ref (already versioned).
  group: release-${{ github.event.inputs.version || github.ref_name }}
  cancel-in-progress: false

# Least privilege by default: the meta and build jobs only read. Only the
# release job is granted write (below), so a compromised build-time tool cannot
# push to the repo or alter other releases.
permissions:
  contents: read

jobs:
  # Resolve the version once so artifact names and the release tag agree.
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      numericVersion: ${{ steps.v.outputs.numericVersion }}
      tag: ${{ steps.v.outputs.tag }}
      prerelease: ${{ steps.v.outputs.prerelease }}
    steps:
      - id: v
        # Pass the (attacker-influenceable) tag / dispatch input through an env
        # var rather than interpolating it into the script, then validate it is
        # strict semver so it can only contain [0-9A-Za-z.+-] downstream.
        env:
          RAW: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          VERSION="${RAW#v}"
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?(\+[0-9A-Za-z.]+)?$'; then
            echo "::error::Invalid version '$VERSION' (expected semver like 1.2.3, 1.2.3-rc.1 or 1.2.3+build.5)"
            exit 1
          fi
          # Windows .exe/NSIS and macOS CFBundle* version resources must be a
          # numeric X.Y.Z: a prerelease like 0.1.0-rc.1 is rejected by makensis
          # and by Apple. Strip any -prerelease / +build suffix for those bundle
          # metadata fields only (artifact filenames still carry the full tag).
          NUMERIC="${VERSION%%-*}"
          NUMERIC="${NUMERIC%%+*}"
          # A semver "-" suffix (e.g. -rc.1) marks a prerelease; "+build" alone
          # does not. Mark the GitHub release accordingly so an RC never appears
          # as a stable release.
          case "$VERSION" in *-*) PRERELEASE=true ;; *) PRERELEASE=false ;; esac
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "numericVersion=$NUMERIC" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION (numeric $NUMERIC, tag v$VERSION, prerelease=$PRERELEASE)"

      # A manual dispatch creates the tag, so refuse to clobber an existing one
      # (a re-dispatch would attach fresh binaries to an already-published tag).
      - name: Reject existing tag on manual dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.v.outputs.tag }}
        run: |
          if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists — push a new tag or delete it first."
            exit 1
          fi
          echo "Tag $TAG is free."

  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin/universal
          - os: windows-latest
            platform: windows/amd64
          # Build the AppImage on the OLDEST supported base (Ubuntu 22.04,
          # glibc 2.35). AppImage does not bundle glibc, so building on a newer
          # base (24.04 = glibc 2.39) would produce a binary that refuses to
          # start on 22.04/Debian 12/etc. 22.04 ships webkit2gtk 4.0.
          - os: ubuntu-22.04
            platform: linux/amd64
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.meta.outputs.version }}
    defaults:
      run:
        shell: bash
        working-directory: o3
    steps:
      - name: Checkout o3
        uses: actions/checkout@v4
        with:
          path: o3

      # Clone the shared client into the exact path go.work expects, relative to
      # o3: ../oa-cli/src/openobserve-cli. openobserve-cli is self-contained
      # (module at repo root, no submodules), so no recursive checkout is needed.
      - name: Checkout openobserve-cli
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OACLI_REPO }}
          ref: ${{ env.OACLI_REF }}
          path: oa-cli/src/openobserve-cli

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # ---- Linux system dependencies (Ubuntu 22.04 ships webkit2gtk 4.0) ----
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      # ---- Windows installer toolchain ----
      - name: Install NSIS
        if: runner.os == 'Windows'
        run: choco install nsis -y

      # Default stamp (full version) — used as-is by the Linux build. The macOS
      # and Windows steps re-stamp a numeric version below because their bundle
      # metadata rejects a -prerelease suffix.
      - name: Stamp version into wails.json
        run: node scripts/set-version.mjs "$VERSION"

      # ---- macOS: universal .app -> .dmg ----
      - name: Build & package (macOS)
        if: runner.os == 'macOS'
        env:
          NUMERIC_VERSION: ${{ needs.meta.outputs.numericVersion }}
        run: |
          # CFBundleVersion / CFBundleShortVersionString must be numeric X.Y.Z;
          # re-stamp so a prerelease tag produces a valid bundle (the in-app
          # main.version ldflag and the .dmg filename keep the full tag).
          node scripts/set-version.mjs "$NUMERIC_VERSION"
          wails build -platform darwin/universal -clean -ldflags "-X main.version=$VERSION"
          VERSION="$VERSION" scripts/dmg.sh

      # ---- Windows: .exe + NSIS installer -> setup.exe + portable.zip ----
      - name: Build & package (Windows)
        if: runner.os == 'Windows'
        env:
          NUMERIC_VERSION: ${{ needs.meta.outputs.numericVersion }}
        run: |
          # Re-stamp with the numeric-only version so the .exe / NSIS version
          # resources are valid even for prerelease tags (the in-app main.version
          # ldflag keeps the full tag).
          node scripts/set-version.mjs "$NUMERIC_VERSION"
          wails build -platform windows/amd64 -nsis -clean -ldflags "-X main.version=$VERSION"
          mv "build/bin/o3-amd64-installer.exe" "build/bin/o3-${VERSION}-windows-amd64-setup.exe"
          # Zip the portable exe with o3.exe at the archive root (run from build/bin).
          ( cd build/bin && 7z a "o3-${VERSION}-windows-amd64-portable.zip" o3.exe )

      # ---- Linux: binary -> AppImage ----
      - name: Build & package (Linux)
        if: runner.os == 'Linux'
        run: |
          # No webkit2_41 tag: 22.04 provides webkit2gtk 4.0 (the Wails default).
          wails build -platform linux/amd64 -clean -ldflags "-X main.version=$VERSION"
          VERSION="$VERSION" scripts/appimage.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: o3-${{ matrix.os }}
          path: |
            o3/build/bin/*.dmg
            o3/build/bin/*-setup.exe
            o3/build/bin/*-portable.zip
            o3/build/bin/*.AppImage
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    # Only this job needs to create the tag/release.
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      # Re-check right before publishing (version-keyed concurrency serializes
      # same-version dispatches, and this final guard closes any residual race so
      # binaries are never attached to a tag a concurrent run already created).
      - name: Reject existing tag on manual dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          if gh api "repos/${{ github.repository }}/git/ref/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists — refusing to attach artifacts to it."
            exit 1
          fi

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          # Point a newly-created tag (manual dispatch) at the exact commit these
          # binaries were built from — without this the action would create the
          # tag on the default branch, so the tag could reference a different
          # commit than the artifacts. Ignored when the tag already exists.
          target_commitish: ${{ github.sha }}
          name: o3 ${{ needs.meta.outputs.tag }}
          draft: true
          prerelease: ${{ needs.meta.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
